{% extends "admin/base.html" %}
{% block title %}Profil{% endblock %}
{% block page_title %}Mon Profil{% endblock %}
{% block content %}
<form method="POST" enctype="multipart/form-data" class="profile-form">

  <div class="profile-layout">

    <!-- SIDEBAR -->
    <aside class="profile-side">

      <!-- Photo -->
      <div class="dash-card profile-card center">
        <h3 class="card-section-title"><i class="fas fa-camera"></i> Photo</h3>

        <div class="photo-preview large">
          <img src="{{ url_for('static', filename=profile.photo) }}" id="photoPreview"/>
        </div>

        <label class="file-label w100">
          <i class="fas fa-upload"></i> Changer
          <input type="file" name="photo" accept="image/*" onchange="previewPhoto(this)">
        </label>
      </div>

      <!-- CV -->
      <div class="dash-card profile-card">
        <h3 class="card-section-title"><i class="fas fa-file-pdf"></i> CV</h3>

        <p class="form-hint">
          Généré automatiquement depuis vos données.
        </p>

        <a href="{{ url_for('download_cv') }}" class="btn-outline w100">
          <i class="fas fa-download"></i> Télécharger
        </a>
      </div>

      <!-- Stats -->
      <div class="dash-card profile-card">
        <h3 class="card-section-title"><i class="fas fa-chart-bar"></i> Stats</h3>

        <div class="fg"><label>Expérience</label><input type="number" name="years_exp" value="{{ profile.years_exp }}"></div>
        <div class="fg"><label>Entreprises</label><input type="number" name="companies" value="{{ profile.companies }}"></div>
        <div class="fg"><label>Technologies</label><input type="number" name="tech_count" value="{{ profile.tech_count }}"></div>

        <div class="toggle-fg">
          <label for="available-toggle">Disponible</label>
          <input type="hidden" name="available" value="0">
          <label class="toggle">
            <input id="available-toggle" type="checkbox" name="available" value="1" {% if profile.available %}checked{% endif %}>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

    </aside>

    <!-- MAIN -->
    <section class="profile-main">

      <!-- Infos -->
      <div class="dash-card">
        <h3 class="card-section-title"><i class="fas fa-user"></i> Informations</h3>

        <div class="fg"><label>Nom</label><input type="text" name="name" value="{{ profile.name }}" required></div>
        <div class="fg"><label>Titre</label><input type="text" name="title" value="{{ profile.title }}" required></div>
        <div class="fg"><label>Bio</label><textarea name="bio">{{ profile.bio }}</textarea></div>

        <div class="fg-row">
          <div class="fg"><label>Email</label><input type="email" name="email" value="{{ profile.email }}"></div>
          <div class="fg"><label>Téléphone</label><input type="text" name="phone" value="{{ profile.phone }}"></div>
        </div>

        <div class="fg"><label>Localisation</label><input type="text" name="location" value="{{ profile.location }}"></div>
      </div>

      <!-- Social -->
      <div class="dash-card mt">
        <h3 class="card-section-title"><i class="fas fa-share-alt"></i> Réseaux</h3>

        <div class="fg"><label>LinkedIn</label><input type="url" name="linkedin" value="{{ profile.linkedin }}"></div>
        <div class="fg"><label>GitHub</label><input type="url" name="github" value="{{ profile.github }}"></div>
      </div>

      <!-- Actions -->
      <div class="form-actions sticky">
        <button class="btn-submit">
          <i class="fas fa-save"></i> Enregistrer
        </button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn-cancel">Annuler</a>
      </div>

    </section>

  </div>
</form>
<script>
function previewPhoto(input) {
  if (input.files && input.files[0]) {
    const r = new FileReader();
    r.onload = e => document.getElementById('photoPreview').src = e.target.result;
    r.readAsDataURL(input.files[0]);
  }
}
</script>
{% endblock %}
